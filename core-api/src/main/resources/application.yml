spring:
  application:
    name: bodeul-core-api
  profiles:
    default: local
    group:
      preview: database
      production: database
  flyway:
    enabled: false
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  port: ${PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info
      path-mapping:
        health: healthz
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
