version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore"

  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Asia/Seoul
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - android
    commit-message:
      prefix: "chore"

  - package-ecosystem: gradle
    directory: /core-api
    schedule:
      interval: weekly
      day: monday
      time: "09:20"
      timezone: Asia/Seoul
    open-pull-requests-limit: 3
    labels:
      - dependencies
    ignore:
      - dependency-name: org.springframework.boot
        update-types:
          - version-update:semver-major
      - dependency-name: gradle-wrapper
        update-types:
          - version-update:semver-major
    commit-message:
      prefix: "chore"

  - package-ecosystem: docker
    directory: /core-api
    schedule:
      interval: weekly
      day: monday
      time: "09:25"
      timezone: Asia/Seoul
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - infrastructure
    commit-message:
      prefix: "chore"

  - package-ecosystem: npm
    directory: /admin-web
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Seoul
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - admin-web
    commit-message:
      prefix: "chore"

  - package-ecosystem: npm
    directory: /functions
    schedule:
      interval: weekly
      day: monday
      time: "09:45"
      timezone: Asia/Seoul
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - functions
    commit-message:
      prefix: "chore"
