name: Core API CI

on:
  pull_request:
    paths:
      - "core-api/**"
      - ".github/workflows/core-api.yml"
  push:
    branches:
      - master
    paths:
      - "core-api/**"
      - ".github/workflows/core-api.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: core-api

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v7

      - name: Gradle Wrapper 검증
        uses: gradle/actions/wrapper-validation@v6

      - name: Java 21 설정
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Gradle 설정
        uses: gradle/actions/setup-gradle@v6

      - name: Core API 검증
        run: ./gradlew check --console=plain

      - name: Cloud Run 컨테이너 빌드 검증
        working-directory: ${{ github.workspace }}
        run: docker build --tag bodeul-core-api:ci ./core-api
