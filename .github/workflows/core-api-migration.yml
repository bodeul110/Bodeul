name: Core API DB Migration

on:
  workflow_dispatch:
    inputs:
      target:
        description: 적용할 DB 환경
        required: true
        type: choice
        options:
          - preview
          - production
      confirm_target:
        description: 확인을 위해 target 값을 다시 입력하세요.
        required: true
        type: string
      confirm_commit:
        description: production 적용 시 master commit SHA 40자를 입력하세요.
        required: false
        default: ""
        type: string
      backup_reference:
        description: production 적용 시 복원 가능한 백업 증적 URL 또는 ID를 입력하세요.
        required: false
        default: ""
        type: string
      apply_companion_session_seed:
        description: preview 동행 세션 백필을 함께 적용합니다.
        required: false
        default: false
        type: boolean
      companion_session_seed_sha256:
        description: 백필 적용 시 생성 SQL의 SHA-256을 입력하세요.
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: core-api-migration-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  migrate:
    name: migrate-${{ inputs.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: core-api-migration-${{ inputs.target }}

    defaults:
      run:
        working-directory: core-api

    env:
      MIGRATION_TARGET: ${{ inputs.target }}
      MIGRATION_CONFIRM_TARGET: ${{ inputs.confirm_target }}

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v7

      - name: 대상 확인
        shell: bash
        env:
          MIGRATION_CONFIRM_COMMIT: ${{ inputs.confirm_commit }}
          MIGRATION_BACKUP_REFERENCE: ${{ inputs.backup_reference }}
          COMPANION_SESSION_SEED_SHA256: ${{ inputs.companion_session_seed_sha256 }}
        run: |
          set -euo pipefail

          if [ "$MIGRATION_TARGET" != "$MIGRATION_CONFIRM_TARGET" ]; then
            echo "입력한 target이 일치하지 않습니다."
            exit 1
          fi

          if [ "$MIGRATION_TARGET" = "production" ]; then
            if [ "$GITHUB_REF" != "refs/heads/master" ]; then
              echo "production migration은 master 브랜치에서만 실행할 수 있습니다." >&2
              exit 1
            fi

            if [ "$MIGRATION_CONFIRM_COMMIT" != "$GITHUB_SHA" ]; then
              echo "입력한 commit SHA와 workflow 실행 commit이 일치하지 않습니다." >&2
              exit 1
            fi

            if [ -z "$MIGRATION_BACKUP_REFERENCE" ]; then
              echo "production migration에는 복원 가능한 백업 증적이 필요합니다." >&2
              exit 1
            fi

            if [[ ! "$MIGRATION_BACKUP_REFERENCE" =~ ^[A-Za-z0-9._:/#=-]+$ ]]; then
              echo "백업 증적에는 URL 또는 안전한 식별자만 입력할 수 있습니다." >&2
              exit 1
            fi
          fi

          if [ "${{ inputs.apply_companion_session_seed }}" = "true" ]; then
            if [ "$MIGRATION_TARGET" != "preview" ] || [ "$GITHUB_REF" != "refs/heads/master" ]; then
              echo "동행 세션 백필은 master의 preview migration에서만 실행할 수 있습니다." >&2
              exit 1
            fi
            if [[ ! "$COMPANION_SESSION_SEED_SHA256" =~ ^[0-9a-fA-F]{64}$ ]]; then
              echo "동행 세션 백필 SHA-256을 확인해 주세요." >&2
              exit 1
            fi
          fi

      - name: migration secret 확인
        shell: bash
        env:
          MIGRATION_DB_JDBC_URL: ${{ secrets.MIGRATION_DB_JDBC_URL }}
          MIGRATION_DB_USERNAME: ${{ secrets.MIGRATION_DB_USERNAME }}
          MIGRATION_DB_PASSWORD: ${{ secrets.MIGRATION_DB_PASSWORD }}
        run: |
          if [ -z "$MIGRATION_DB_JDBC_URL" ] || [ -z "$MIGRATION_DB_USERNAME" ] || [ -z "$MIGRATION_DB_PASSWORD" ]; then
            echo "migration Environment secret이 준비되지 않았습니다."
            exit 1
          fi

      - name: 동행 세션 백필 secret 확인
        if: inputs.apply_companion_session_seed
        shell: bash
        env:
          COMPANION_SESSION_SEED_SQL_BASE64: ${{ secrets.COMPANION_SESSION_SEED_SQL_BASE64 }}
        run: |
          if [ -z "$COMPANION_SESSION_SEED_SQL_BASE64" ]; then
            echo "동행 세션 백필 일회성 secret이 준비되지 않았습니다."
            exit 1
          fi

      - name: Java 21 설정
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Gradle 설정
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Gradle Wrapper 검증
        uses: gradle/actions/wrapper-validation@v6

      - name: Core API 검증
        run: ./gradlew check --console=plain

      - name: Flyway migration 실행
        env:
          MIGRATION_DB_JDBC_URL: ${{ secrets.MIGRATION_DB_JDBC_URL }}
          MIGRATION_DB_USERNAME: ${{ secrets.MIGRATION_DB_USERNAME }}
          MIGRATION_DB_PASSWORD: ${{ secrets.MIGRATION_DB_PASSWORD }}
        run: ./gradlew migrateDatabase --console=plain

      - name: 동행 세션 백필 파일 준비
        if: inputs.apply_companion_session_seed
        shell: bash
        env:
          COMPANION_SESSION_SEED_SQL_BASE64: ${{ secrets.COMPANION_SESSION_SEED_SQL_BASE64 }}
          COMPANION_SESSION_SEED_SHA256: ${{ inputs.companion_session_seed_sha256 }}
        run: |
          set -euo pipefail
          seed_file="${RUNNER_TEMP}/companion-session-seed.sql"
          printf '%s' "$COMPANION_SESSION_SEED_SQL_BASE64" | base64 --decode > "$seed_file"
          chmod 600 "$seed_file"
          actual_sha256="$(sha256sum "$seed_file" | cut -d' ' -f1)"
          if [ "$actual_sha256" != "${COMPANION_SESSION_SEED_SHA256,,}" ]; then
            echo "동행 세션 백필 파일 SHA-256이 입력값과 일치하지 않습니다." >&2
            exit 1
          fi

      - name: 동행 세션 백필 실행
        if: inputs.apply_companion_session_seed
        env:
          COMPANION_SESSION_SEED_SQL_FILE: ${{ runner.temp }}/companion-session-seed.sql
          MIGRATION_DB_JDBC_URL: ${{ secrets.MIGRATION_DB_JDBC_URL }}
          MIGRATION_DB_USERNAME: ${{ secrets.MIGRATION_DB_USERNAME }}
          MIGRATION_DB_PASSWORD: ${{ secrets.MIGRATION_DB_PASSWORD }}
        run: ./gradlew applyCompanionSessionSeed --console=plain

      - name: 동행 세션 백필 파일 삭제
        if: always() && inputs.apply_companion_session_seed
        shell: bash
        run: rm -f "${RUNNER_TEMP}/companion-session-seed.sql"

      - name: migration 결과 기록
        shell: bash
        env:
          MIGRATION_BACKUP_REFERENCE: ${{ inputs.backup_reference }}
        run: |
          {
            echo "## Core API DB Migration"
            echo
            echo "- Target: ${MIGRATION_TARGET}"
            echo "- Commit: ${GITHUB_SHA}"
            if [ "$MIGRATION_TARGET" = "production" ]; then
              echo "- Backup: ${MIGRATION_BACKUP_REFERENCE}"
            fi
            if [ "${{ inputs.apply_companion_session_seed }}" = "true" ]; then
              echo "- Companion session seed: applied"
              echo "- Seed SHA-256: ${{ inputs.companion_session_seed_sha256 }}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
