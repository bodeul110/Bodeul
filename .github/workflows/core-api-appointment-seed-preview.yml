name: Core API Appointment Seed Preview

on:
  workflow_dispatch:
    inputs:
      confirm_operation:
        description: apply-appointment-requests-preview를 정확히 입력하세요.
        required: true
        type: string
      expected_sha256:
        description: 로컬 seed SQL의 소문자 SHA-256을 입력하세요.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: core-api-appointment-seed-preview
  cancel-in-progress: false

jobs:
  validate-request:
    name: 요청 범위 확인
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CONFIRM_OPERATION: ${{ inputs.confirm_operation }}
      EXPECTED_SHA256: ${{ inputs.expected_sha256 }}
    steps:
      - name: master와 입력값 확인
        shell: bash
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF" != "refs/heads/master" ]; then
            echo "이 workflow는 master에서만 실행할 수 있습니다."
            exit 1
          fi
          if [ "$CONFIRM_OPERATION" != "apply-appointment-requests-preview" ]; then
            echo "예약 요청 preview 백필 확인 문구가 일치하지 않습니다."
            exit 1
          fi
          if [[ ! "$EXPECTED_SHA256" =~ ^[0-9a-f]{64}$ ]]; then
            echo "expected_sha256은 소문자 64자리 SHA-256이어야 합니다."
            exit 1
          fi

  apply-seed:
    name: 예약 요청 preview 백필
    needs: validate-request
    runs-on: [self-hosted, Windows, X64, bodeul, preflight]
    timeout-minutes: 15
    environment: core-api-migration-preview

    defaults:
      run:
        working-directory: core-api

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Java 21 설정
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Gradle 설정
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: 로컬 예약 요청 seed 확인
        shell: powershell
        env:
          EXPECTED_SHA256: ${{ inputs.expected_sha256 }}
        run: |
          $ErrorActionPreference = "Stop"
          $expectedPath = "D:\BoDeul\tools\firebase\reports\appointment-requests-postgres-apply-20260717.sql"
          $resolvedPath = (Resolve-Path -LiteralPath $expectedPath).Path
          if (-not [string]::Equals($resolvedPath, $expectedPath, [System.StringComparison]::OrdinalIgnoreCase)) {
            throw "예약 요청 seed 경로가 일치하지 않습니다."
          }
          $seedFile = Get-Item -Force -LiteralPath $resolvedPath
          if ($seedFile.PSIsContainer -or ($seedFile.Attributes -band [System.IO.FileAttributes]::ReparsePoint)) {
            throw "예약 요청 seed가 일반 파일이 아닙니다."
          }
          if ($seedFile.Length -le 0 -or $seedFile.Length -gt 1MB) {
            throw "예약 요청 seed 파일 크기가 허용 범위를 벗어났습니다."
          }
          $actualSha256 = (Get-FileHash -Algorithm SHA256 -LiteralPath $resolvedPath).Hash.ToLowerInvariant()
          if ($actualSha256 -ne $env:EXPECTED_SHA256) {
            throw "예약 요청 seed SHA-256이 일치하지 않습니다."
          }
          $utf8NoBom = New-Object System.Text.UTF8Encoding -ArgumentList $false
          [System.IO.File]::AppendAllText(
            $env:GITHUB_ENV,
            "APPOINTMENT_REQUESTS_SEED_SQL_FILE=$resolvedPath`n",
            $utf8NoBom
          )

      - name: 예약 요청 seed 적용
        shell: powershell
        env:
          MIGRATION_DB_JDBC_URL: ${{ secrets.MIGRATION_DB_JDBC_URL }}
          MIGRATION_DB_USERNAME: ${{ secrets.MIGRATION_DB_USERNAME }}
          MIGRATION_DB_PASSWORD: ${{ secrets.MIGRATION_DB_PASSWORD }}
        run: .\gradlew.bat applyAppointmentRequestsSeed --console=plain
