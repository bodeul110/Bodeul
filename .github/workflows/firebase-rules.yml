name: Firebase Rules

on:
  pull_request:
    paths:
      - "firestore.rules"
      - "storage.rules"
      - "firebase.json"
      - "tools/firebase/package.json"
      - "tools/firebase/package-lock.json"
      - "tools/firebase/rules-emulator-tests/**"
      - ".github/workflows/firebase-rules.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rules:
    name: emulator-rules-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v7

      - name: Node.js 설정
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tools/firebase/package-lock.json

      - name: JDK 21 설정
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Firebase 도구 의존성 설치
        working-directory: tools/firebase
        run: npm ci

      - name: Firestore/Storage Rules emulator 테스트
        working-directory: tools/firebase
        run: npm run test:rules
