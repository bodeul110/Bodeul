name: Admin Web Build

on:
  pull_request:
    paths:
      - "admin-web/**"
      - "firebase.json"
      - ".github/workflows/admin-web.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint-and-build
    runs-on: ubuntu-latest
    environment: admin-web-preview
    timeout-minutes: 15
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_APPCHECK_SITE_KEY: ${{ secrets.VITE_FIREBASE_APPCHECK_SITE_KEY }}
    defaults:
      run:
        shell: bash

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v7

      - name: Node.js 설정
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin-web/package-lock.json

      - name: 관리자 웹 의존성 설치
        working-directory: admin-web
        run: npm ci

      - name: 관리자 웹 lint
        working-directory: admin-web
        run: npm run lint

      - name: 관리자 웹 빌드
        working-directory: admin-web
        run: npm run build

      # 이 workflow는 레포 분리 준비용 검증만 담당하고 Firebase Hosting 배포는 수행하지 않는다.
      - name: 빌드 산출물 업로드
        uses: actions/upload-artifact@v7
        with:
          name: admin-web-dist
          path: admin-web/dist/
          if-no-files-found: error
          retention-days: 7
