name: Core API Secret Bootstrap

on:
  workflow_dispatch:
    inputs:
      confirm_service:
        description: "이전 대상을 확인하기 위해 bodeul-core-api-preview를 입력하세요"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: core-api-secret-bootstrap
  cancel-in-progress: false

jobs:
  migrate-secrets:
    name: migrate-secrets
    runs-on: ubuntu-latest
    environment: core-api-preview
    timeout-minutes: 10
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
      CLOUD_RUN_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.CLOUD_RUN_WORKLOAD_IDENTITY_PROVIDER }}
      CLOUD_RUN_DEPLOY_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_DEPLOY_SERVICE_ACCOUNT }}

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v7

      - name: 이전 대상 확인
        shell: bash
        env:
          CONFIRM_SERVICE: ${{ inputs.confirm_service }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/master" ]]; then
            echo "Secret 이전은 master 브랜치에서만 실행할 수 있습니다." >&2
            exit 1
          fi

          if [[ "${CLOUD_RUN_SERVICE}" != "bodeul-core-api-preview" || "${CONFIRM_SERVICE}" != "${CLOUD_RUN_SERVICE}" ]]; then
            echo "입력한 서비스명과 실제 대상이 일치하지 않습니다." >&2
            exit 1
          fi

          required_variables=(
            GCP_PROJECT_ID
            CLOUD_RUN_WORKLOAD_IDENTITY_PROVIDER
            CLOUD_RUN_DEPLOY_SERVICE_ACCOUNT
          )

          for variable_name in "${required_variables[@]}"; do
            if [[ -z "${!variable_name:-}" ]]; then
              echo "${variable_name} Environment variable이 비어 있습니다." >&2
              exit 1
            fi
          done

      - name: Google Cloud WIF 인증
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.CLOUD_RUN_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.CLOUD_RUN_DEPLOY_SERVICE_ACCOUNT }}

      - name: Google Cloud CLI 설정
        uses: google-github-actions/setup-gcloud@v3

      - name: GitHub secret을 Secret Manager로 이전
        shell: bash
        env:
          CORE_DB_JDBC_URL: ${{ secrets.CORE_DB_JDBC_URL }}
          CORE_DB_USERNAME: ${{ secrets.CORE_DB_USERNAME }}
          CORE_DB_PASSWORD: ${{ secrets.CORE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          set +x

          secret_ids=(
            bodeul-core-api-preview-db-jdbc-url
            bodeul-core-api-preview-db-username
            bodeul-core-api-preview-db-password
          )
          secret_values=(
            "${CORE_DB_JDBC_URL}"
            "${CORE_DB_USERNAME}"
            "${CORE_DB_PASSWORD}"
          )

          for index in "${!secret_ids[@]}"; do
            if [[ -z "${secret_values[$index]}" ]]; then
              echo "${secret_ids[$index]}에 대응하는 GitHub secret이 비어 있습니다." >&2
              exit 1
            fi

            existing_version="$(gcloud secrets versions list "${secret_ids[$index]}" \
              --project="${GCP_PROJECT_ID}" --limit=1 --format='value(name)')"
            if [[ -n "${existing_version}" ]]; then
              echo "${secret_ids[$index]}에 이미 version이 있어 이전을 중단합니다." >&2
              exit 1
            fi
          done

          versions=()
          for index in "${!secret_ids[@]}"; do
            version_name="$(printf '%s' "${secret_values[$index]}" | \
              gcloud secrets versions add "${secret_ids[$index]}" \
                --project="${GCP_PROJECT_ID}" --data-file=- --quiet --format='value(name)')"
            versions+=("${version_name##*/}")
          done

          {
            echo "## Core API Secret 이전"
            echo
            for index in "${!secret_ids[@]}"; do
              echo "- ${secret_ids[$index]}: version ${versions[$index]}"
            done
          } >> "${GITHUB_STEP_SUMMARY}"
