name: Core API Production Deploy

on:
  workflow_dispatch:
    inputs:
      confirm_service:
        description: "배포 대상 확인을 위해 bodeul-core-api를 입력하세요"
        required: true
        type: string
      confirm_commit:
        description: "배포할 master commit SHA 40자를 입력하세요"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: core-api-production-deploy
  cancel-in-progress: false

jobs:
  deploy-production:
    name: deploy-production
    runs-on: ubuntu-latest
    environment: core-api-production
    timeout-minutes: 35
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
      CLOUD_RUN_ARTIFACT_REPOSITORY: ${{ vars.CLOUD_RUN_ARTIFACT_REPOSITORY }}
      CLOUD_RUN_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.CLOUD_RUN_WORKLOAD_IDENTITY_PROVIDER }}
      CLOUD_RUN_DEPLOY_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_DEPLOY_SERVICE_ACCOUNT }}
      CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
      CORE_DB_JDBC_URL_SECRET_VERSION: ${{ vars.CORE_DB_JDBC_URL_SECRET_VERSION }}
      CORE_DB_USERNAME_SECRET_VERSION: ${{ vars.CORE_DB_USERNAME_SECRET_VERSION }}
      CORE_DB_PASSWORD_SECRET_VERSION: ${{ vars.CORE_DB_PASSWORD_SECRET_VERSION }}
      KAKAO_LOCAL_REST_API_KEY_SECRET_VERSION: ${{ vars.KAKAO_LOCAL_REST_API_KEY_SECRET_VERSION }}
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      FIREBASE_PROJECT_NUMBER: ${{ vars.FIREBASE_PROJECT_NUMBER }}
      BODEUL_APP_CHECK_MODE: ${{ vars.BODEUL_APP_CHECK_MODE }}

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v7

      - name: 배포 대상과 설정 확인
        id: config
        shell: bash
        env:
          CONFIRM_SERVICE: ${{ inputs.confirm_service }}
          CONFIRM_COMMIT: ${{ inputs.confirm_commit }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/master" ]]; then
            echo "Core API production은 master 브랜치에서만 배포할 수 있습니다." >&2
            exit 1
          fi

          if [[ "${CONFIRM_COMMIT}" != "${GITHUB_SHA}" ]]; then
            echo "입력한 commit SHA와 workflow 실행 commit이 일치하지 않습니다." >&2
            exit 1
          fi

          required_variables=(
            GCP_PROJECT_ID
            GCP_REGION
            CLOUD_RUN_SERVICE
            CLOUD_RUN_ARTIFACT_REPOSITORY
            CLOUD_RUN_WORKLOAD_IDENTITY_PROVIDER
            CLOUD_RUN_DEPLOY_SERVICE_ACCOUNT
            CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT
            CORE_DB_JDBC_URL_SECRET_VERSION
            CORE_DB_USERNAME_SECRET_VERSION
            CORE_DB_PASSWORD_SECRET_VERSION
            KAKAO_LOCAL_REST_API_KEY_SECRET_VERSION
            FIREBASE_PROJECT_ID
            FIREBASE_PROJECT_NUMBER
            BODEUL_APP_CHECK_MODE
          )

          for variable_name in "${required_variables[@]}"; do
            if [[ -z "${!variable_name:-}" ]]; then
              echo "${variable_name} Environment variable이 비어 있습니다." >&2
              exit 1
            fi
          done

          if [[ "${GCP_PROJECT_ID}" == "bodeul-dev" || ! "${GCP_PROJECT_ID}" =~ ^bodeul-prod-[a-z0-9-]+$ ]]; then
            echo "production Google Cloud project ID가 허용된 형식이 아닙니다." >&2
            exit 1
          fi

          if [[ "${FIREBASE_PROJECT_ID}" != "${GCP_PROJECT_ID}" ]]; then
            echo "Firebase와 Google Cloud project ID가 일치해야 합니다." >&2
            exit 1
          fi

          if [[ "${GCP_REGION}" != "asia-northeast1" ]]; then
            echo "production Cloud Run 리전은 asia-northeast1이어야 합니다." >&2
            exit 1
          fi

          if [[ "${CLOUD_RUN_SERVICE}" != "bodeul-core-api" || "${CONFIRM_SERVICE}" != "${CLOUD_RUN_SERVICE}" ]]; then
            echo "입력한 서비스명과 production 배포 대상이 일치하지 않습니다." >&2
            exit 1
          fi

          if [[ "${CLOUD_RUN_ARTIFACT_REPOSITORY}" != "bodeul-core-api" ]]; then
            echo "허용된 Artifact Registry 이름이 아닙니다." >&2
            exit 1
          fi

          expected_deploy_account="bodeul-core-deployer@${GCP_PROJECT_ID}.iam.gserviceaccount.com"
          expected_runtime_account="bodeul-core-runtime@${GCP_PROJECT_ID}.iam.gserviceaccount.com"
          if [[ "${CLOUD_RUN_DEPLOY_SERVICE_ACCOUNT}" != "${expected_deploy_account}" ]]; then
            echo "production 배포 서비스 계정이 기준과 다릅니다." >&2
            exit 1
          fi
          if [[ "${CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT}" != "${expected_runtime_account}" ]]; then
            echo "production 런타임 서비스 계정이 기준과 다릅니다." >&2
            exit 1
          fi

          if [[ ! "${CLOUD_RUN_WORKLOAD_IDENTITY_PROVIDER}" =~ /workloadIdentityPools/github-actions/providers/bodeul-core-api-production$ ]]; then
            echo "production WIF provider가 기준과 다릅니다." >&2
            exit 1
          fi

          if [[ "${BODEUL_APP_CHECK_MODE}" != "observe" && "${BODEUL_APP_CHECK_MODE}" != "enforce" ]]; then
            echo "production App Check 모드는 observe 또는 enforce여야 합니다." >&2
            exit 1
          fi

          secret_versions=(
            CORE_DB_JDBC_URL_SECRET_VERSION
            CORE_DB_USERNAME_SECRET_VERSION
            CORE_DB_PASSWORD_SECRET_VERSION
            KAKAO_LOCAL_REST_API_KEY_SECRET_VERSION
          )
          for variable_name in "${secret_versions[@]}"; do
            if [[ ! "${!variable_name}" =~ ^[1-9][0-9]*$ ]]; then
              echo "${variable_name}은 1 이상의 숫자여야 합니다." >&2
              exit 1
            fi
          done

          registry="${GCP_REGION}-docker.pkg.dev"
          image="${registry}/${GCP_PROJECT_ID}/${CLOUD_RUN_ARTIFACT_REPOSITORY}/bodeul-core-api"
          echo "registry=${registry}" >> "${GITHUB_OUTPUT}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"

      - name: Gradle Wrapper 검증
        uses: gradle/actions/wrapper-validation@v6

      - name: Java 21 설정
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Gradle 설정
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Core API 검증
        working-directory: core-api
        run: ./gradlew check --console=plain

      - name: Google Cloud WIF 인증
        id: gcp-auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.CLOUD_RUN_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.CLOUD_RUN_DEPLOY_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Google Cloud CLI 설정
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: 현재 정상 revision 기록
        id: previous
        shell: bash
        run: |
          set -euo pipefail
          revision="$(gcloud run services describe "${CLOUD_RUN_SERVICE}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --format='value(status.latestReadyRevisionName)' 2>/dev/null || true)"
          echo "revision=${revision}" >> "${GITHUB_OUTPUT}"

      - name: Artifact Registry 로그인
        uses: docker/login-action@v4
        with:
          registry: ${{ steps.config.outputs.registry }}
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v4

      - name: 컨테이너 빌드와 게시
        uses: docker/build-push-action@v7
        with:
          context: ./core-api
          file: ./core-api/Dockerfile
          push: true
          tags: |
            ${{ steps.config.outputs.image }}:${{ github.sha }}
            ${{ steps.config.outputs.image }}:production
          cache-from: type=gha,scope=core-api-production
          cache-to: type=gha,mode=max,scope=core-api-production
          provenance: true
          sbom: true

      - name: Cloud Run production 배포
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          region: ${{ env.GCP_REGION }}
          service: ${{ env.CLOUD_RUN_SERVICE }}
          image: ${{ steps.config.outputs.image }}:${{ github.sha }}
          env_vars: |-
            SPRING_PROFILES_ACTIVE=production
            FIREBASE_PROJECT_ID=${{ env.FIREBASE_PROJECT_ID }}
            FIREBASE_PROJECT_NUMBER=${{ env.FIREBASE_PROJECT_NUMBER }}
            BODEUL_APP_CHECK_MODE=${{ env.BODEUL_APP_CHECK_MODE }}
            CORE_DB_POOL_MAX=2
          env_vars_update_strategy: overwrite
          secrets: |-
            CORE_DB_JDBC_URL=bodeul-core-api-production-db-jdbc-url:${{ env.CORE_DB_JDBC_URL_SECRET_VERSION }}
            CORE_DB_USERNAME=bodeul-core-api-production-db-username:${{ env.CORE_DB_USERNAME_SECRET_VERSION }}
            CORE_DB_PASSWORD=bodeul-core-api-production-db-password:${{ env.CORE_DB_PASSWORD_SECRET_VERSION }}
            KAKAO_LOCAL_REST_API_KEY=bodeul-core-api-production-kakao-local-rest-api-key:${{ env.KAKAO_LOCAL_REST_API_KEY_SECRET_VERSION }}
          secrets_update_strategy: overwrite
          labels: |-
            environment=production
            component=core-api
          timeout: 30s
          flags: >-
            --service-account=${{ env.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
            --cpu=1
            --memory=1Gi
            --min-instances=0
            --max-instances=2
            --concurrency=20
            --port=8080
            --execution-environment=gen2
            --cpu-boost
            --ingress=all
          revision_traffic: LATEST=100

      - name: 배포 smoke test
        shell: bash
        env:
          SERVICE_URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -euo pipefail

          if [[ -z "${SERVICE_URL}" ]]; then
            echo "Cloud Run 서비스 URL을 확인할 수 없습니다." >&2
            exit 1
          fi

          curl --fail --silent --show-error \
            --retry 8 --retry-delay 3 --retry-all-errors \
            "${SERVICE_URL}/health" > health.json
          jq -e '.status == "UP"' health.json > /dev/null

          auth_status="$(curl --silent --show-error \
            --output auth.json --write-out '%{http_code}' \
            "${SERVICE_URL}/api/auth/me")"
          if [[ "${auth_status}" != "401" ]]; then
            echo "무인증 요청이 예상한 401이 아니라 ${auth_status}을 반환했습니다." >&2
            exit 1
          fi
          jq -e '.error == "missing_authorization"' auth.json > /dev/null

          place_auth_status="$(curl --silent --show-error \
            --output place-auth.json --write-out '%{http_code}' \
            --get --data-urlencode 'query=서울대병원' \
            --data-urlencode 'category=HOSPITAL' \
            "${SERVICE_URL}/api/places/search")"
          if [[ "${place_auth_status}" != "401" ]]; then
            echo "장소 검색 무인증 요청은 401이어야 하지만 ${place_auth_status}를 반환했습니다." >&2
            exit 1
          fi
          jq -e '.error == "missing_authorization"' place-auth.json > /dev/null

      - name: Smoke 실패 시 직전 revision 복구
        if: ${{ failure() && steps.deploy.outcome == 'success' && steps.previous.outputs.revision != '' }}
        shell: bash
        env:
          PREVIOUS_REVISION: ${{ steps.previous.outputs.revision }}
        run: |
          set -euo pipefail
          gcloud run services update-traffic "${CLOUD_RUN_SERVICE}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --to-revisions="${PREVIOUS_REVISION}=100" \
            --quiet
          echo "Smoke 실패로 ${PREVIOUS_REVISION} revision에 트래픽을 복구했습니다." >&2

      - name: 배포 결과 기록
        if: ${{ success() }}
        shell: bash
        env:
          SERVICE_URL: ${{ steps.deploy.outputs.url }}
        run: |
          {
            echo "## Core API Production 배포"
            echo
            echo "- Project: ${GCP_PROJECT_ID}"
            echo "- Region: ${GCP_REGION}"
            echo "- Service: ${CLOUD_RUN_SERVICE}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- App Check: ${BODEUL_APP_CHECK_MODE}"
            echo "- URL: ${SERVICE_URL}"
            echo "- 확인: health 200, 무인증 auth/place search 401"
          } >> "${GITHUB_STEP_SUMMARY}"
