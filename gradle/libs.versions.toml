[versions]
androidGradlePlugin = "9.2.1"
googleServices = "4.5.0"
firebaseBom = "34.15.0"
androidxAppcompat = "1.7.1"
androidxCredentials = "1.6.0"
material = "1.14.0"
googleId = "1.2.0"
kakao = "2.24.0"
kakaomap = "2.13.2"
naverOauth = "5.11.2"
junit4 = "4.13.2"
androidxJunit = "1.3.0"
espresso = "3.7.0"

[plugins]
android-application = { id = "com.android.application", version.ref = "androidGradlePlugin" }
google-services = { id = "com.google.gms.google-services", version.ref = "googleServices" }

[libraries]
firebase-bom = { module = "com.google.firebase:firebase-bom", version.ref = "firebaseBom" }
androidx-appcompat = { module = "androidx.appcompat:appcompat", version.ref = "androidxAppcompat" }
androidx-credentials = { module = "androidx.credentials:credentials", version.ref = "androidxCredentials" }
androidx-credentials-play-services-auth = { module = "androidx.credentials:credentials-play-services-auth", version.ref = "androidxCredentials" }
material = { module = "com.google.android.material:material", version.ref = "material" }
firebase-auth = { module = "com.google.firebase:firebase-auth" }
firebase-appcheck-debug = { module = "com.google.firebase:firebase-appcheck-debug" }
firebase-appcheck-playintegrity = { module = "com.google.firebase:firebase-appcheck-playintegrity" }
firebase-firestore = { module = "com.google.firebase:firebase-firestore" }
firebase-functions = { module = "com.google.firebase:firebase-functions" }
firebase-messaging = { module = "com.google.firebase:firebase-messaging" }
firebase-storage = { module = "com.google.firebase:firebase-storage" }
googleid = { module = "com.google.android.libraries.identity.googleid:googleid", version.ref = "googleId" }
kakao-user = { module = "com.kakao.sdk:v2-user", version.ref = "kakao" }
kakao-map = { module = "com.kakao.maps.open:android", version.ref = "kakaomap" }
naver-oauth = { module = "com.navercorp.nid:oauth", version.ref = "naverOauth" }
junit4 = { module = "junit:junit", version.ref = "junit4" }
androidx-junit = { module = "androidx.test.ext:junit", version.ref = "androidxJunit" }
espresso-core = { module = "androidx.test.espresso:espresso-core", version.ref = "espresso" }
